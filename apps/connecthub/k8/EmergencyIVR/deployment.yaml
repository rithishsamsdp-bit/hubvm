apiVersion: apps/v1
kind: Deployment
metadata:
  name: emergency-ivr-consumer
  namespace: connecthub
  labels:
    app: emergency-ivr-consumer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: emergency-ivr-consumer
  template:
    metadata:
      labels:
        app: emergency-ivr-consumer
    spec:
      containers:
      - name: emergency-ivr-consumer
        image: DOCKER_IMAGE
        ports:
        - containerPort: 8000
        resources:
          limits:
            memory: "256Mi"
            cpu: "500m"
          requests:
            memory: "128Mi"
            cpu: "250m"
        envFrom:
        - secretRef:
            name: kafka-details
        - secretRef:
            name: auth-token-secrets
        - secretRef:
            name: mysql-secrets
        - secretRef:
            name: s3-secrets

