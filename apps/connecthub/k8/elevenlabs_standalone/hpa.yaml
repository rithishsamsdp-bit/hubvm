apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: elevenlabs-proxy-hpa
  namespace: connecthub
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: elevenlabs-proxy
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
