<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in to Pulse</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Segoe UI", sans-serif;
      background-color: #F1F5F9; 
    }

    .login {
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      width: 100%;
      max-width: 586px;
      background-color: #FFFFFF;
      padding: 40px 60px;
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .loginlogo img {
      width: 140px;
      height: auto;
      margin-bottom: 35px;
    }

    .logincardheading {
      font-family: "Inter", sans-serif;
      font-size: 18px;
      color: #000000;
      font-weight: 600;
      text-align: center;
      margin-bottom: 39px;
    }

    .login-card-body {
      width: 100%;
      display: flex;
      flex-direction: column;
    }

    .login-input-group {
      display: flex;
      flex-direction: column;
      margin-bottom: 24px;
    }

    .form_label {
      font-size: 14px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 8px;
    }

    input[type="text"] {
      border: none;
      border: 1px solid #a3a3a3;
      border-radius: 5px;
      background-color: #ffffff;
      font-size: 12px;
      padding: 5px 5px 5px 16px;
      font-family: "Segoe UI", sans-serif;
      font-weight: 400;
      letter-spacing: .12px;
      line-height: 145%;
      height: 40px;
    }

    input[type="text"]:focus {
      border-color: #ff5200;
      outline: none;
    }

    button {
        height: 40px;
        background-color: #ff5200;
        color: #ffffff;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-family: "Segoe UI", sans-serif;
        font-weight: 700;
        font-size:  12px;
        letter-spacing: .1px;
    }

  </style>
</head>

<body>
  <div class="login">
    <div class="login-card">

      <!-- Your SVG Logo -->
      <div class="loginlogo">
        <img src="https://connecthubv2.s3.ap-south-1.amazonaws.com/Pulse_logo.svg" alt="Pulse Logo">
      </div>

      <h3 class="logincardheading">Sign in to Pulse</h3>

      <form class="login-card-body" method="get" action="/auth/set-email">
        <div class="login-input-group">
          <label class="form_label">Enter your email</label>
          <input type="text" name="email" placeholder="Enter email" required>
        </div>

        <button type="submit">Continue</button>
      </form>

    </div>
  </div>
</body>

</html>
