apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentconversation
  namespace: connecthub
  labels:
    app: agentconversation
spec:
  replicas: 5 # Number of pods to run
  selector:
    matchLabels:
      app: agentconversation
  template:
    metadata:
      labels:
        app: agentconversation
    spec:
      containers:
        - name: agentconversation
          image: 647096474516.dkr.ecr.ap-south-1.amazonaws.com/connecthubtest/agentconversation:latest
          ports:
            - containerPort: 8000
          resources:
            limits:
              memory: "256Mi"
              cpu: "500m"
            requests:
              memory: "128Mi"
              cpu: "250m"
          envFrom:
            - secretRef:
                name: auth-token-secrets
            - secretRef:
                name: mysql-secrets
