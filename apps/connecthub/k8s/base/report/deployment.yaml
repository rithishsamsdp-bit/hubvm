apiVersion: apps/v1
kind: Deployment
metadata:
  name: connecthub-report
  namespace: connecthub
  labels:
    app: report
spec:
  replicas: 1  # Number of pods to runs
  selector:
    matchLabels:
      app: report
  template:
    metadata:
      labels:
        app: report
    spec:
      containers:
      - name: report
        image: 647096474516.dkr.ecr.ap-south-1.amazonaws.com/connecthubtest/report:latest
        ports:
        - containerPort: 8000
        resources:
          limits:
            memory: "2Gi"
            cpu: "2000m"
          requests:
            memory: "1Gi"
            cpu: "100m"
        envFrom:
          - secretRef:
              name: auth-token-secrets
          - secretRef:
              name: mysql-secrets
