              cpu: "500m"
            requests:
              memory: "128Mi"
              cpu: "250m"
              
        - name: fastapi-eslevent-fs8
          image: 647096474516.dkr.ecr.ap-south-1.amazonaws.com/connecthubtest/esl-fs8:latest
          envFrom:
            - secretRef:
                name: esl-details-fs8
          resources:
            limits:
              memory: "256Mi"
              cpu: "500m"
            requests:
              memory: "128Mi"
              cpu: "250m"

---
apiVersion: v1
kind: Service
metadata:
  name: fastapi-eslevent
  namespace: connecthub
spec:
  selector:
    app: fastapi-eslevent
  ports:
    - name: producer  # Fixed typo
      port: 3000
      targetPort: 3000
