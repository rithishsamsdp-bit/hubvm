apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-eslevent
  namespace: connecthub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fastapi-eslevent
  template:
    metadata:
      labels:
        app: fastapi-eslevent
    spec:
      containers:
        - name: fastapi-eslevent-fs1
          image: 647096474516.dkr.ecr.ap-south-1.amazonaws.com/connecthubtest/esl-fs1:latest
          envFrom:
            - secretRef:
                name: esl-details-fs1
          resources:
            limits:
              memory: "256Mi"
              cpu: "500m"
            requests:
              memory: "128Mi"
              cpu: "250m"

        - name: fastapi-eslevent-fs2
          image: 647096474516.dkr.ecr.ap-south-1.amazonaws.com/connecthubtest/esl-fs2:latest
          envFrom:
            - secretRef:
                name: esl-details-fs2
          resources:
            limits:
              memory: "256Mi"
              cpu: "500m"
            requests:
              memory: "128Mi"
              cpu: "250m"

        - name: fastapi-eslevent-fs3
          image: 647096474516.dkr.ecr.ap-south-1.amazonaws.com/connecthubtest/esl-fs3:latest
          envFrom:
            - secretRef:
