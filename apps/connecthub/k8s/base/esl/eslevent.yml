          resources:
            limits:
              memory: "256Mi"
              cpu: "500m"
            requests:
              memory: "128Mi"
              cpu: "250m"

        - name: fastapi-eslevent-fs4
          image: 647096474516.dkr.ecr.ap-south-1.amazonaws.com/connecthubtest/esl-fs4:latest
          envFrom:
            - secretRef:
                name: esl-details-fs4
          resources:
            limits:
              memory: "256Mi"
              cpu: "500m"
            requests:
              memory: "128Mi"
              cpu: "250m"

        - name: fastapi-eslevent-fs5
          image: 647096474516.dkr.ecr.ap-south-1.amazonaws.com/connecthubtest/esl-fs5:latest
          envFrom:
            - secretRef:
                name: esl-details-fs5
          resources:
            limits:
              memory: "256Mi"
              cpu: "500m"
            requests:
              memory: "128Mi"
              cpu: "250m"

        - name: fastapi-eslevent-fs6
          image: 647096474516.dkr.ecr.ap-south-1.amazonaws.com/connecthubtest/esl-fs6:latest
