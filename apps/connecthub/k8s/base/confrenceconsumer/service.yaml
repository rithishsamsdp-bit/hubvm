apiVersion: v1
kind: Service
metadata:
  name: confrenceconsumer-service
  namespace: connecthub
spec:
  selector:
    app: confrenceconsumer
  ports:
  - protocol: TCP
    port: 8000 # Exposed service port
    targetPort: 8000 # Port on the container
  type: ClusterIP # Change to NodePort if LoadBalancer isn't available
