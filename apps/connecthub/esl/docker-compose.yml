    restart: unless-stopped
    networks:
      - esl-network

  esl-kafka-consumer:
    build: ./consumer
    container_name: esl-kafka-consumer
    # depends_on:
    #   kafka:
    #     condition: service_healthy
    restart: unless-stopped
    networks:
      - esl-network
    environment:
      KAFKA_BROKER: kafka:9092
      KAFKA_TOPIC: freeswitch_events
      KAFKA_GROUP_ID: esl-consumer-group

# Define a custom network
networks:
  esl-network:
    driver: bridge