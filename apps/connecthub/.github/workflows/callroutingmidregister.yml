name: callroutingmidregister Workflow

on:
  push:
    branches: [ "main" ]
    paths:
      - 'callroutingmidregister/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'callroutingmidregister/**'



env:
  AWS_REGION: ap-south-1                   # set this to your preferred AWS region, e.g. us-west-1
  ECR_REPOSITORY: connecthub_auth          # set this to your Amazon ECR repository name
  ECS_SERVICE: fastapi-callroutingmidregister                 # set this to your Amazon ECS service name
  ECS_CLUSTER: connecthub                 # set this to your Amazon ECS cluster name
  ECS_TASK_DEFINITION: MY_ECS_TASK_DEFINITION # set this to the path to your Amazon ECS task definition
                                               # file, e.g. .aws/task-definition.json
  CONTAINER_NAME: MY_CONTAINER_NAME           # set this to the name of the container in the
                                               # containerDefinitions section of your task definition

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        # Build a docker container and
        # push it to ECR so that it can
        # be deployed to ECS.
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG-${ECS_SERVICE}  -f docker/callroutingmidregister/Dockerfile .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG-${ECS_SERVICE}
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG-${ECS_SERVICE}" >> $GITHUB_OUTPUT

    - name: Update kube configa
      run: aws eks update-kubeconfig --name $ECS_CLUSTER --region $AWS_REGION

    - name: Deploy to EKS
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}        
        IMAGE_TAG: ${{ github.sha }}-fastapi-callroutingmidregister 
      run: |
        sed -i.bak "s|DOCKER_IMAGE|$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG|g" k8/callroutingmidregister/deployment.yaml && \
        kubectl apply -f k8/callroutingmidregister/deployment.yaml
        kubectl apply -f k8/callroutingmidregister/service.yaml