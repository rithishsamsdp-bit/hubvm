version: "3.9"

services:
  predectivelogic:
    build:
      context: ../..
      dockerfile: docker/Predectivelogic/Logic/Dockerfile
    container_name: predectivelogic
    working_dir: /app
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    restart: unless-stopped
    networks:
      - connecthub_network
    volumes:
      - ../../Predectivelogic/app:/app
    depends_on:
      redis:
        condition: service_healthy

  originate:
    build:
      context: ../..
      dockerfile: docker/Predectivelogic/Originate/Dockerfile
    container_name: originate
    working_dir: /app
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    restart: unless-stopped
    networks:
      - connecthub_network
    volumes:
      - ../../Predectivelogic/app:/app
    depends_on:
      redis:
        condition: service_healthy
      predectivelogic:
        condition: service_started
  monitor:
    build:
      context: ../..
      dockerfile: docker/Predectivelogic/monitor/Dockerfile
    container_name: monitor
    working_dir: /app
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    restart: unless-stopped
    networks:
      - connecthub_network
    volumes:
      - ../../Predectivelogic/app:/app
    depends_on:
      redis:
        condition: service_healthy
      predectivelogic:
        condition: service_started

  redis:
    image: redis:7
    container_name: redis
    command: ["redis-server", "--appendonly", "yes"]
    restart: unless-stopped
    networks:
      - connecthub_network
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

networks:
  connecthub_network:
    driver: bridge

volumes:
  redis_data: