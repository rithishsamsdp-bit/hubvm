apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-zookeeper
  namespace: connecthub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-zookeeper
  template:
    metadata:
      labels:
        app: kafka-zookeeper
    spec:
      containers:
        - name: zookeeper
          image: confluentinc/cp-zookeeper:7.2.2
          ports:
            - containerPort: 2181
          env:
            - name: ZOOKEEPER_CLIENT_PORT
              value: "2181"

        - name: kafka
          image: confluentinc/cp-kafka:7.2.2
          ports:
            - containerPort: 9092
            - containerPort: 9093
          env:
            - name: KAFKA_BROKER_ID
              value: "1"
            - name: KAFKA_ZOOKEEPER_CONNECT
              value: "localhost:2181"
            - name: KAFKA_ADVERTISED_LISTENERS
              # Fixed: Using your actual node IP
              value: "INTERNAL://kafka-service:9092,EXTERNAL://13.126.75.6:30092"
            - name: KAFKA_LISTENERS
              # Fixed: Using correct internal ports
              value: "INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9093"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT"
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: "INTERNAL"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
              
        - name: producer
          image: IMAGEPRODUCER
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: KAFKA_BROKER
              value: "kafka-service:9092"

        - name: consumer
          image: IMAGE_CONSUMER
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: KAFKA_BROKER
              value: "kafka-service:9092"
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka-service:9092"
            - name: BOOTSTRAP_SERVERS
              value: "kafka-service:9092"
            - name: KAFKA_BROKERS
              value: "kafka-service:9092"

---
apiVersion: v1
kind: Service
metadata:
  name: kafka-service
  namespace: connecthub
spec:
  type: NodePort
  selector:
    app: kafka-zookeeper
  ports:
    - name: kafka-internal
      port: 9092
      targetPort: 9092
      nodePort: 30102
    - name: kafka-external  
      port: 9093
      targetPort: 9093
      nodePort: 30092  # External access port
    - name: zookeeper
      port: 2181
      targetPort: 2181
      nodePort: 30181
    - name: producer
      port: 3000
      targetPort: 3000
      nodePort: 30300