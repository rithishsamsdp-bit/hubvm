apiVersion: v1
kind: Service
metadata:
  name: freeswitch-service
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
    service.beta.kubernetes.io/aws-load-balancer-target-type: "ip"
    service.beta.kubernetes.io/aws-load-balancer-udp-ports: "5060"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-protocol: "TCP"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-port: "5060"
    
spec:
  selector:
    app: freeswitch
  type: LoadBalancer
  ports:
  - name: sip-udp
    nodePort: 30720
    port: 5060
    protocol: UDP
    targetPort: 5060
  - name: sip-tcp
    nodePort: 30721
    port: 5060
    protocol: TCP
    targetPort: 5060
  - name: esl-tcp
    nodePort: 30722
    port: 8021
    protocol: TCP
    targetPort: 8021
